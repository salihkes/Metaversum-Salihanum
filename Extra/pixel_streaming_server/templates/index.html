<!DOCTYPE html>
<html>
<head>
    <title>Ianua Salihana - Pixel Streaming</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; touch-action: none; }
        #video-container { width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }
        /* object-fit: cover ensures video fills the screen, cropping if necessary, without stretching */
        video { width: 100%; height: 100%; object-fit: cover; cursor: none; }
    </style>
</head>
<body>
    <div id="video-container">
        <video id="stream" autoplay playsinline muted></video>
    </div>
    <script src="client.js"></script>
</body>
</html>
