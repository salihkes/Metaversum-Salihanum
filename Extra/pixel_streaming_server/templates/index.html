<!DOCTYPE html>
<html>
<head>
    <title>Ianua Salihana - Pixel Streaming</title>
    <style>
        body { 
            margin: 0; 
            background: #0d1117; 
            overflow: hidden; 
            touch-action: none;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
        }
        #video-container { width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }
        /* object-fit: cover ensures video fills the screen, cropping if necessary, without stretching */
        video { width: 100%; height: 100%; object-fit: cover; cursor: none; }

        /* Login Overlay - Styled per request */
        #login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(13, 17, 23, 0.85);
            backdrop-filter: blur(12px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.5s ease;
        }
        
        #login-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .login-box {
            background: #161b22;
            border: 1px solid #30363d;
            padding: 40px;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 24px 48px rgba(0, 0, 0, 0.4);
            width: 320px;
            transform: translateY(0);
            transition: transform 0.3s ease;
        }

        h2 {
            color: #f0f6fc;
            margin: 0 0 24px 0;
            font-weight: 600;
            font-size: 1.5rem;
        }

        input {
            width: 100%;
            background: #0d1117;
            border: 1px solid #30363d;
            color: #f0f6fc;
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 16px;
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: #58a6ff;
            box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.1);
        }

        button {
            width: 100%;
            background: linear-gradient(180deg, #238636 0%, #2ea043 100%);
            color: white;
            border: 1px solid rgba(240, 246, 252, 0.1);
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1rem;
            transition: filter 0.2s, transform 0.1s;
        }

        button:hover {
            filter: brightness(1.1);
        }
        
        button:active {
            transform: scale(0.98);
        }

        .error {
            color: #ff7b72;
            margin-top: 16px;
            font-size: 0.9rem;
            display: none;
            animation: shake 0.4s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
    </style>
</head>
<body>
    <div id="login-overlay">
        <div class="login-box">
            <h2>Ianua Salihana</h2>
            <form id="login-form">
                <input type="password" id="passphrase" placeholder="Enter Passphrase" autofocus />
                <button type="submit">Enter World</button>
            </form>
            <div class="error" id="login-error">Access Denied</div>
        </div>
    </div>

    <div id="video-container">
        <video id="stream" autoplay playsinline muted></video>
    </div>
    <!-- Add timestamp to force reload of client.js -->
    <script>
        const script = document.createElement('script');
        script.src = "client.js?v=" + new Date().getTime();
        script.onload = function() {
            console.log("client.js loaded successfully");
        };
        document.body.appendChild(script);
    </script>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            document.getElementById('login-form').addEventListener('submit', function(e) {
                e.preventDefault();
                if (typeof window.attemptLogin === 'function') {
                    window.attemptLogin();
                } else {
                    console.warn('Client script not yet ready. Please wait...');
                    // Retry once after a short delay just in case
                    setTimeout(() => {
                        if (typeof window.attemptLogin === 'function') {
                            window.attemptLogin();
                        } else {
                             alert("Error: Client script failed to load. Please refresh the page.");
                        }
                    }, 500);
                }
            });
        });
    </script>
</body>
</html>
