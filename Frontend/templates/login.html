<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Metaversum Salihanum</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Verdana, Arial, sans-serif;
      font-size: 12px;
      background-color: #f4f4f4;
      color: #1a1a1b;
    }
    a { color: #0079d3; text-decoration: none; }
    a:hover { text-decoration: underline; }
    
    /* Header */
    .header {
      background-color: #cee3f8;
      border-bottom: 1px solid #5f99cf;
      padding: 4px 10px;
    }
    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo {
      font-size: 18px;
      font-weight: bold;
      color: #ff4500;
    }
    .logo:hover { text-decoration: none; }
    .tagline {
      font-size: 10px;
      color: #555;
      margin-left: 8px;
    }
    
    /* Main content */
    .main-container {
      max-width: 600px;
      margin: 40px auto;
      padding: 0 10px;
    }
    .content-box {
      background: #fff;
      border: 1px solid #ddd;
      padding: 20px;
      margin-bottom: 10px;
    }
    .content-box h2 {
      font-size: 14px;
      color: #1a1a1b;
      margin-bottom: 15px;
      padding-bottom: 8px;
      border-bottom: 1px solid #ddd;
    }
    
    /* Tabs */
    .tabs {
      display: flex;
      border-bottom: 1px solid #ddd;
      margin-bottom: 15px;
    }
    .tab {
      padding: 8px 15px;
      cursor: pointer;
      background: none;
      border: none;
      font-family: Verdana, Arial, sans-serif;
      font-size: 12px;
      color: #0079d3;
    }
    .tab:hover { text-decoration: underline; }
    .tab.active {
      color: #1a1a1b;
      font-weight: bold;
      border-bottom: 2px solid #ff4500;
      margin-bottom: -1px;
    }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    
    /* Form */
    .form-row {
      margin-bottom: 10px;
    }
    .form-row label {
      display: block;
      font-size: 11px;
      font-weight: bold;
      color: #555;
      margin-bottom: 4px;
    }
    .form-row input[type="text"],
    .form-row input[type="password"] {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid #c4c4c4;
      font-family: Verdana, Arial, sans-serif;
      font-size: 12px;
    }
    .form-row input:focus {
      outline: none;
      border-color: #0079d3;
    }
    .submit-btn {
      background-color: #ff4500;
      color: #fff;
      border: none;
      padding: 6px 16px;
      font-family: Verdana, Arial, sans-serif;
      font-size: 12px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
    }
    .submit-btn:hover {
      background-color: #e63e00;
    }
    
    /* Error message */
    .error-box {
      background-color: #fff6f6;
      border: 1px solid #ff4500;
      color: #c00;
      padding: 8px 12px;
      margin-bottom: 15px;
      font-size: 11px;
    }
    
    /* Footer */
    .footer {
      text-align: center;
      padding: 20px;
      font-size: 10px;
      color: #888;
    }
    .footer a { color: #888; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-inner">
      <div>
        <a href="/" class="logo">metaversum salihanum</a>
        <span class="tagline">the virtual world</span>
      </div>
    </div>
  </div>
  
  <div class="main-container">
    <div class="content-box">
      <h2>login or register</h2>
      
      {% if error %}
      <div class="error-box">{{ error }}</div>
      {% endif %}
      
      <div class="tabs">
        <button class="tab active" onclick="showTab('login')">login</button>
        <button class="tab" onclick="showTab('register')">register</button>
      </div>
      
      <div id="login" class="tab-content active">
        <form method="post" action="{{ url_for('login') }}">
          <input type="hidden" name="action" value="login">
          <div class="form-row">
            <label for="login_username">username</label>
            <input type="text" id="login_username" name="username" value="{{ username or '' }}" required>
          </div>
          <div class="form-row">
            <label for="login_password">password</label>
            <input type="password" id="login_password" name="password" required>
          </div>
          <button type="submit" class="submit-btn">login</button>
        </form>
      </div>
      
      <div id="register" class="tab-content">
        <form method="post" action="{{ url_for('login') }}">
          <input type="hidden" name="action" value="register">
          <div class="form-row">
            <label for="register_username">username</label>
            <input type="text" id="register_username" name="username" value="{{ username or '' }}" required>
          </div>
          <div class="form-row">
            <label for="register_password">password</label>
            <input type="password" id="register_password" name="password" required>
          </div>
          <div class="form-row">
            <label for="confirm_password">confirm password</label>
            <input type="password" id="confirm_password" name="confirm_password" required>
          </div>
          <button type="submit" class="submit-btn">register</button>
        </form>
      </div>
    </div>
  </div>
  
  <div class="footer">
    <p>metaversum salihanum</p>
  </div>
  
  <script>
    function showTab(tabName) {
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.getElementById(tabName).classList.add('active');
      event.target.classList.add('active');
    }
  </script>
</body>
</html>
